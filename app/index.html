<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RiskLens — Financial Risk Analyzer</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #060810;
      --surface:  #0b0e18;
      --card:     #0f1221;
      --card2:    #131729;
      --border:   rgba(255,255,255,0.07);
      --border2:  rgba(255,255,255,0.12);
      --accent:   #00d4ff;
      --accent2:  #0094b3;
      --accent-bg: rgba(0,212,255,0.06);
      --accent-border: rgba(0,212,255,0.18);
      --text:     #e4eaf6;
      --muted:    #5a6478;
      --dim:      #3a4157;
      --high:     #ff4d6d;
      --high-bg:  rgba(255,77,109,0.08);
      --high-bd:  rgba(255,77,109,0.2);
      --med:      #f5a623;
      --med-bg:   rgba(245,166,35,0.08);
      --med-bd:   rgba(245,166,35,0.2);
      --low:      #00e5a0;
      --low-bg:   rgba(0,229,160,0.08);
      --low-bd:   rgba(0,229,160,0.2);
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; overflow: hidden; }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 4px);
    }

    body::after {
      content: '';
      position: fixed; top: 0; left: 0; right: 0; height: 1px; z-index: 100;
      background: linear-gradient(90deg, transparent 0%, var(--accent) 40%, var(--accent) 60%, transparent 100%);
      opacity: 0.5;
    }

    .layout {
      position: relative; z-index: 1;
      display: grid;
      grid-template-rows: 64px 1fr 80px;
      height: 100vh;
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px;
    }

    header {
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .logo { display: flex; align-items: center; gap: 10px; }

    .logo-name {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 15px; font-weight: 500;
      letter-spacing: 0.04em; color: var(--text);
    }
    .logo-name span { color: var(--accent); }

    .header-right { display: flex; align-items: center; gap: 16px; }

    .ticker-strip { display: flex; align-items: center; gap: 16px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
    .ticker-item { display: flex; align-items: center; gap: 5px; color: var(--muted); }
    .ticker-item .sym { color: var(--text); font-weight: 500; }
    .ticker-item .up { color: var(--low); }
    .ticker-item .dn { color: var(--high); }

    .live-badge {
      display: flex; align-items: center; gap: 6px;
      font-family: 'IBM Plex Mono', monospace; font-size: 10px;
      color: var(--low); background: var(--low-bg);
      border: 1px solid var(--low-bd);
      padding: 4px 10px; border-radius: 3px;
      letter-spacing: 0.1em; text-transform: uppercase;
    }

    .pulse { width: 5px; height: 5px; border-radius: 50%; background: var(--low); animation: blink 1.5s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

    .feed {
      overflow-y: auto; padding: 20px 0; display: flex; flex-direction: column; gap: 16px;
      scrollbar-width: thin; scrollbar-color: var(--dim) transparent;
    }
    .feed::-webkit-scrollbar { width: 3px; }
    .feed::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

    .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 20px; opacity: 0.35; }
    .empty-chart { display: flex; align-items: flex-end; gap: 4px; height: 48px; }
    .empty-bar { width: 8px; border-radius: 2px 2px 0 0; background: var(--accent); animation: barFloat 2s ease-in-out infinite; }
    .empty-bar:nth-child(1){height:30%;animation-delay:0s;}
    .empty-bar:nth-child(2){height:60%;animation-delay:0.15s;}
    .empty-bar:nth-child(3){height:40%;animation-delay:0.3s;}
    .empty-bar:nth-child(4){height:80%;animation-delay:0.45s;}
    .empty-bar:nth-child(5){height:55%;animation-delay:0.6s;}
    .empty-bar:nth-child(6){height:70%;animation-delay:0.75s;}
    .empty-bar:nth-child(7){height:35%;animation-delay:0.9s;}
    @keyframes barFloat { 0%,100%{transform:scaleY(1);} 50%{transform:scaleY(1.2);} }
    .empty p { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }

    .row { animation: fadeUp 0.25s ease-out both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }

    .user-row { display: flex; justify-content: flex-end; }
    .user-bubble { max-width: 65%; background: var(--accent-bg); border: 1px solid var(--accent-border); border-radius: 2px 12px 12px 12px; padding: 10px 14px; }
    .tag { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; }
    .user-text { font-size: 13px; line-height: 1.6; color: var(--text); }

    .ai-row { display: flex; gap: 10px; }
    .ai-icon { width: 26px; min-width: 26px; height: 26px; margin-top: 2px; border: 1px solid var(--border2); border-radius: 4px; display: flex; align-items: center; justify-content: center; }
    .ai-icon svg { width: 14px; height: 14px; }

    .result-card { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 2px 10px 10px 10px; overflow: hidden; }

    .result-top { display: flex; align-items: stretch; border-bottom: 1px solid var(--border); }
    .risk-score-block { padding: 14px 18px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 4px; min-width: 130px; }
    .risk-score-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .risk-score-value { font-family: 'IBM Plex Mono', monospace; font-size: 22px; font-weight: 500; line-height: 1; }
    .risk-score-value.high { color: var(--high); }
    .risk-score-value.medium { color: var(--med); }
    .risk-score-value.low { color: var(--low); }

    .risk-meter-block { flex: 1; padding: 14px 18px; display: flex; flex-direction: column; justify-content: center; gap: 8px; }
    .meter-track { height: 4px; background: var(--card2); border-radius: 2px; overflow: hidden; }
    .meter-fill { height: 100%; border-radius: 2px; transition: width 0.8s cubic-bezier(0.16,1,0.3,1); }
    .meter-fill.high   { background: linear-gradient(90deg,#ff4d6d,#ff8fa3); }
    .meter-fill.medium { background: linear-gradient(90deg,#f5a623,#ffd166); }
    .meter-fill.low    { background: linear-gradient(90deg,#00e5a0,#79ffd6); }
    .meter-labels { display: flex; justify-content: space-between; font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--dim); letter-spacing: 0.06em; }

    .result-body { padding: 14px 18px; display: flex; flex-direction: column; gap: 14px; }
    .section-head { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; display: flex; align-items: center; gap: 6px; }
    .section-head::after { content:''; flex:1; height:1px; background:var(--border); }
    .summary-text { font-size: 13px; line-height: 1.7; color: #bdc8dc; }
    .reason-panel { background: var(--card2); border-left: 2px solid var(--med); padding: 10px 13px; font-size: 13px; line-height: 1.6; color: #f5e0b8; border-radius: 0 4px 4px 0; }
    .pill-list { display: flex; flex-direction: column; gap: 6px; }
    .pill-row { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; line-height: 1.6; color: #bdc8dc; }
    .pill-dot { width: 4px; min-width: 4px; height: 4px; border-radius: 50%; margin-top: 8px; }
    .pill-dot.g { background: var(--low); }
    .pill-dot.b { background: var(--accent); }
    .divider { height: 1px; background: var(--border); }

    .typing-card { flex:1; background:var(--card); border:1px solid var(--border); border-radius:2px 10px 10px 10px; padding:16px 18px; display:flex; align-items:center; gap:5px; }
    .t-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); opacity:0.4; animation:tdot 1.1s ease-in-out infinite; }
    .t-dot:nth-child(2){animation-delay:0.18s;} .t-dot:nth-child(3){animation-delay:0.36s;}
    @keyframes tdot { 0%,60%,100%{opacity:0.2;transform:scale(0.85);} 30%{opacity:1;transform:scale(1);} }

    .err-card { flex:1; padding:12px 16px; background:var(--high-bg); border:1px solid var(--high-bd); border-radius:2px 10px 10px 10px; font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--high); }

    .input-bar { display:flex; flex-direction:column; justify-content:center; border-top:1px solid var(--border); padding:12px 0; gap:8px; }
    .input-wrap { display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--border); border-radius:6px; padding:8px 10px 8px 16px; transition:border-color 0.2s; }
    .input-wrap:focus-within { border-color:var(--accent2); box-shadow:0 0 0 3px rgba(0,212,255,0.05); }
    .input-prefix { font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--accent); opacity:0.6; user-select:none; }
    .input-field { flex:1; background:transparent; border:none; outline:none; font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--text); caret-color:var(--accent); }
    .input-field::placeholder { color:var(--dim); }
    .send-btn { width:36px; height:36px; border-radius:5px; background:var(--accent); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; flex-shrink:0; }
    .send-btn:hover { filter:brightness(1.15); }
    .send-btn:active { transform:scale(0.95); }
    .send-btn:disabled { opacity:0.3; cursor:not-allowed; transform:none; }
    .send-btn svg { width:15px; height:15px; fill:#060810; }
    .input-hint { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--dim); letter-spacing:0.06em; text-align:center; }
  </style>
</head>
<body>
<div class="layout">

  <header>
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="4" fill="#0b0e18"/>
        <rect x="0.5" y="0.5" width="27" height="27" rx="3.5" stroke="rgba(0,212,255,0.25)"/>
        <polyline points="4,22 9,14 13,18 18,8 24,12" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="18" cy="8" r="2" fill="#00d4ff"/>
      </svg>
      <span class="logo-name">Financial_<span>Risk_analyzer</span></span>
    </div>
    <div class="header-right">
      <div class="live-badge"><div class="pulse"></div>Live</div>
    </div>
  </header>

  <div class="feed" id="feed">
    <div class="empty" id="empty">
      <div class="empty-chart">
        <div class="empty-bar"></div><div class="empty-bar"></div>
        <div class="empty-bar"></div><div class="empty-bar"></div>
        <div class="empty-bar"></div><div class="empty-bar"></div>
        <div class="empty-bar"></div>
      </div>
      <p>Enter financial data to begin risk analysis</p>
    </div>
  </div>

  <div class="input-bar">
    <div class="input-wrap">
      <span class="input-prefix">&gt;_</span>
      <input class="input-field" id="input" placeholder="e.g. $80k salary, $30k crypto, $15k credit card debt..." autocomplete="off"/>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
</div>

<script>
  const API_URL = "/analyze";
  let busy = false;

  document.getElementById("input").addEventListener("keydown", e => {
    if (e.key === "Enter") { e.preventDefault(); sendMessage(); }
  });

  function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

  function riskClass(level) {
    const l = (level || "").toLowerCase();
    return l.includes("high") ? "high" : l.includes("med") ? "medium" : "low";
  }

  function meterWidth(cls) {
    return cls === "high" ? "88%" : cls === "medium" ? "52%" : "18%";
  }

  function hideEmpty() { const e = document.getElementById("empty"); if (e) e.remove(); }
  function scroll() { const f = document.getElementById("feed"); f.scrollTop = f.scrollHeight; }

  function addUser(text) {
    hideEmpty();
    const row = document.createElement("div");
    row.className = "row user-row";
    row.innerHTML = `<div class="user-bubble"><div class="tag">Query</div><div class="user-text">${esc(text)}</div></div>`;
    document.getElementById("feed").appendChild(row);
    scroll();
  }

  function addTyping() {
    hideEmpty();
    const row = document.createElement("div");
    row.className = "row ai-row"; row.id = "typing";
    row.innerHTML = `
      <div class="ai-icon"><svg viewBox="0 0 14 14" fill="none"><path d="M2 11L7 2l5 9H2z" stroke="#00d4ff" stroke-width="1.2" stroke-linejoin="round"/></svg></div>
      <div class="typing-card">
        <div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div>
        <span style="font-family:IBM Plex Mono,monospace;font-size:11px;color:var(--muted);margin-left:8px;letter-spacing:0.06em;">ANALYZING...</span>
      </div>`;
    document.getElementById("feed").appendChild(row);
    scroll();
  }

  function removeTyping() { const t = document.getElementById("typing"); if (t) t.remove(); }

  function addResult(data) {
    const cls = riskClass(data.risk_level);
    const w   = meterWidth(cls);
    const impr = (data.improvements || []).map(i =>
      `<div class="pill-row"><div class="pill-dot g"></div><span>${esc(i)}</span></div>`).join("") ||
      `<div class="pill-row" style="color:var(--muted)">No data</div>`;
    const plan = (data.stability_plan || []).map(i =>
      `<div class="pill-row"><div class="pill-dot b"></div><span>${esc(i)}</span></div>`).join("") ||
      `<div class="pill-row" style="color:var(--muted)">No data</div>`;

    const row = document.createElement("div");
    row.className = "row ai-row";
    row.innerHTML = `
      <div class="ai-icon"><svg viewBox="0 0 14 14" fill="none"><path d="M2 11L7 2l5 9H2z" stroke="#00d4ff" stroke-width="1.2" stroke-linejoin="round"/></svg></div>
      <div class="result-card">
        <div class="result-top">
          <div class="risk-score-block">
            <div class="risk-score-label">Risk Level</div>
            <div class="risk-score-value ${cls}">${esc(data.risk_level || "—")}</div>
          </div>
          <div class="risk-meter-block">
            <div class="meter-track"><div class="meter-fill ${cls}" style="width:${w};"></div></div>
            <div class="meter-labels"><span>LOW</span><span>MODERATE</span><span>HIGH</span></div>
          </div>
        </div>
        <div class="result-body">
          <div>
            <div class="section-head">Summary</div>
            <div class="summary-text">${esc(data.summary || "")}</div>
          </div>
          <div class="divider"></div>
          <div>
            <div class="section-head">Key Risk Factor</div>
            <div class="reason-panel">${esc(data.reason || "")}</div>
          </div>
          <div class="divider"></div>
          <div>
            <div class="section-head">Recommended Actions</div>
            <div class="pill-list">${impr}</div>
          </div>
          <div class="divider"></div>
          <div>
            <div class="section-head">Stability Plan</div>
            <div class="pill-list">${plan}</div>
          </div>
        </div>
      </div>`;
    document.getElementById("feed").appendChild(row);
    scroll();
  }

  function addError(msg) {
    const row = document.createElement("div");
    row.className = "row ai-row";
    row.innerHTML = `
      <div class="ai-icon"><svg viewBox="0 0 14 14" fill="none"><path d="M2 11L7 2l5 9H2z" stroke="#00d4ff" stroke-width="1.2" stroke-linejoin="round"/></svg></div>
      <div class="err-card">ERR // ${esc(msg)}</div>`;
    document.getElementById("feed").appendChild(row);
    scroll();
  }

  async function sendMessage() {
    if (busy) return;
    const inp = document.getElementById("input");
    const text = inp.value.trim();
    if (!text) return;
    busy = true; inp.value = "";
    document.getElementById("sendBtn").disabled = true;
    addUser(text); addTyping();
    try {
      const res = await fetch(API_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({text}) });
      const data = await res.json();
      removeTyping(); addResult(data);
    } catch {
      removeTyping(); addError("Connection to analysis server failed. Please retry.");
    } finally {
      busy = false; document.getElementById("sendBtn").disabled = false; inp.focus();
    }
  }
</script>
</body>
</html>
