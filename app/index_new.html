<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Financial Risk Analyzer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #09090f;
      --surface: #0e0e1a;
      --panel: #13131f;
      --border: rgba(255,255,255,0.06);
      --border-glow: rgba(99,102,241,0.25);
      --accent: #6366f1;
      --accent-soft: rgba(99,102,241,0.15);
      --gold: #f59e0b;
      --high: #ef4444;
      --high-soft: rgba(239,68,68,0.12);
      --medium: #f59e0b;
      --medium-soft: rgba(245,158,11,0.12);
      --low: #10b981;
      --low-soft: rgba(16,185,129,0.12);
      --text: #e2e8f0;
      --muted: #64748b;
      --dim: #475569;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Radial glow */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      max-width: 820px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* Header */
    header {
      padding: 28px 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-icon {
      width: 38px;
      height: 38px;
      background: var(--accent-soft);
      border: 1px solid var(--border-glow);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .brand-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1;
    }

    .brand-text p {
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--low);
      background: var(--low-soft);
      border: 1px solid rgba(16,185,129,0.2);
      padding: 5px 12px;
      border-radius: 20px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: var(--low);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* Messages area */
    .messages-wrap {
      overflow-y: auto;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--dim) transparent;
    }

    .messages-wrap::-webkit-scrollbar { width: 4px; }
    .messages-wrap::-webkit-scrollbar-track { background: transparent; }
    .messages-wrap::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      opacity: 0.4;
    }

    .empty-icon { font-size: 36px; }

    .empty-state p {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* Message bubbles */
    .msg-row {
      animation: slideUp 0.3s ease-out both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* User message */
    .user-msg {
      display: flex;
      justify-content: flex-end;
    }

    .user-bubble {
      max-width: 68%;
      background: var(--accent-soft);
      border: 1px solid var(--border-glow);
      border-radius: 16px 16px 4px 16px;
      padding: 12px 16px;
    }

    .user-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .user-text {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
    }

    /* AI response card */
    .ai-msg {
      display: flex;
      gap: 12px;
    }

    .ai-avatar {
      width: 32px;
      height: 32px;
      min-width: 32px;
      border-radius: 8px;
      background: var(--accent-soft);
      border: 1px solid var(--border-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      margin-top: 4px;
    }

    .ai-card {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
      overflow: hidden;
    }

    /* Risk header */
    .risk-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }

    .risk-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .risk-badge {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: 0.05em;
    }

    .risk-badge.high {
      color: var(--high);
      background: var(--high-soft);
      border: 1px solid rgba(239,68,68,0.25);
    }
    .risk-badge.medium {
      color: var(--medium);
      background: var(--medium-soft);
      border: 1px solid rgba(245,158,11,0.25);
    }
    .risk-badge.low {
      color: var(--low);
      background: var(--low-soft);
      border: 1px solid rgba(16,185,129,0.25);
    }

    /* Card body */
    .card-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 14px; }

    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .summary-text {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
    }

    .reason-box {
      background: rgba(245,158,11,0.06);
      border-left: 2px solid var(--gold);
      border-radius: 0 6px 6px 0;
      padding: 10px 14px;
    }

    .reason-text {
      font-size: 13px;
      line-height: 1.6;
      color: #fde68a;
    }

    .list-items {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .list-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 13px;
      line-height: 1.6;
      color: #cbd5e1;
    }

    .list-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      margin-top: 7px;
      flex-shrink: 0;
    }

    .list-dot.green { background: var(--low); }
    .list-dot.blue { background: var(--accent); }

    .divider {
      height: 1px;
      background: var(--border);
    }

    /* Typing indicator */
    .typing-card {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: typing 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { opacity: 0.2; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-4px); }
    }

    /* Input area */
    .input-area {
      padding: 16px 0 24px;
      border-top: 1px solid var(--border);
    }

    .input-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 8px 8px 16px;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--border-glow);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.07);
    }

    .input-field {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      caret-color: var(--accent);
    }

    .input-field::placeholder { color: var(--dim); }

    .send-btn {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }

    .send-btn:hover { background: #818cf8; transform: scale(1.05); }
    .send-btn:active { transform: scale(0.96); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .send-btn svg { width: 16px; height: 16px; fill: white; }

    .input-hint {
      margin-top: 8px;
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 0.04em;
    }

    /* Error */
    .error-msg {
      font-size: 13px;
      color: var(--high);
      background: var(--high-soft);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'DM Mono', monospace;
    }
  </style>
</head>
<body>

<div class="app">
  <header>
    <div class="brand">
      <div class="brand-icon">📊</div>
      <div class="brand-text">
        <h1>Financial Risk Analyzer</h1>
        <p>AI-Powered Assessment Engine</p>
      </div>
    </div>
    <div class="status-badge">
      <div class="status-dot"></div>
      System Online
    </div>
  </header>

  <div class="messages-wrap" id="messages">
    <div class="empty-state" id="empty">
      <div class="empty-icon">🔍</div>
      <p>Describe your financial situation to begin analysis</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <input
        class="input-field"
        id="input"
        placeholder="e.g. I have $50k in crypto, $20k in debt, monthly income $5k..."
        autocomplete="off"
      />
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
  const API_URL = "/analyze";
  let isLoading = false;

  document.getElementById("input").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function appendUserMsg(text) {
    hideEmpty();
    const row = document.createElement("div");
    row.className = "msg-row user-msg";
    row.innerHTML = `
      <div class="user-bubble">
        <div class="user-label">You</div>
        <div class="user-text">${escHtml(text)}</div>
      </div>`;
    document.getElementById("messages").appendChild(row);
    scrollBottom();
  }

  function appendTyping() {
    hideEmpty();
    const row = document.createElement("div");
    row.className = "msg-row ai-msg";
    row.id = "typing-row";
    row.innerHTML = `
      <div class="ai-avatar">🤖</div>
      <div class="typing-card">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>`;
    document.getElementById("messages").appendChild(row);
    scrollBottom();
  }

  function removeTyping() {
    const t = document.getElementById("typing-row");
    if (t) t.remove();
  }

  function appendAICard(data) {
    const riskClass = (data.risk_level || "").toLowerCase();
    const improvements = (data.improvements || []).map(i =>
      `<div class="list-item"><div class="list-dot green"></div><span>${escHtml(i)}</span></div>`
    ).join("") || '<div class="list-item"><span style="color:var(--muted)">N/A</span></div>';

    const plan = (data.stability_plan || []).map(i =>
      `<div class="list-item"><div class="list-dot blue"></div><span>${escHtml(i)}</span></div>`
    ).join("") || '<div class="list-item"><span style="color:var(--muted)">N/A</span></div>';

    const row = document.createElement("div");
    row.className = "msg-row ai-msg";
    row.innerHTML = `
      <div class="ai-avatar">🤖</div>
      <div class="ai-card">
        <div class="risk-header">
          <span class="risk-label">Risk Assessment</span>
          <span class="risk-badge ${riskClass}">${escHtml(data.risk_level || "Unknown")}</span>
        </div>
        <div class="card-body">
          <div>
            <div class="section-label">Summary</div>
            <div class="summary-text">${escHtml(data.summary || "")}</div>
          </div>
          <div class="divider"></div>
          <div>
            <div class="section-label">⚠ Key Reason</div>
            <div class="reason-box">
              <div class="reason-text">${escHtml(data.reason || "")}</div>
            </div>
          </div>
          <div class="divider"></div>
          <div>
            <div class="section-label">✅ Improvements</div>
            <div class="list-items">${improvements}</div>
          </div>
          <div class="divider"></div>
          <div>
            <div class="section-label">📈 Stability Plan</div>
            <div class="list-items">${plan}</div>
          </div>
        </div>
      </div>`;
    document.getElementById("messages").appendChild(row);
    scrollBottom();
  }

  function appendError(msg) {
    const row = document.createElement("div");
    row.className = "msg-row ai-msg";
    row.innerHTML = `
      <div class="ai-avatar">🤖</div>
      <div class="error-msg">⚠ ${escHtml(msg)}</div>`;
    document.getElementById("messages").appendChild(row);
    scrollBottom();
  }

  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    isLoading = true;
    input.value = "";
    document.getElementById("sendBtn").disabled = true;

    appendUserMsg(text);
    appendTyping();

    try {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
      });
      const data = await response.json();
      removeTyping();
      appendAICard(data);
    } catch (err) {
      removeTyping();
      appendError("Error connecting to API. Please try again.");
    } finally {
      isLoading = false;
      document.getElementById("sendBtn").disabled = false;
      input.focus();
    }
  }

  function hideEmpty() {
    const e = document.getElementById("empty");
    if (e) e.remove();
  }

  function scrollBottom() {
    const m = document.getElementById("messages");
    m.scrollTop = m.scrollHeight;
  }

  function escHtml(str) {
    const d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
  }
</script>

</body>
</html>
